<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCET AI Chatbot</title>
    <meta name="description"
        content="Official AI chatbot of Thakur College of Engineering and Technology (TCET). Get instant answers about admissions, placements, courses and more." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <style>
        /* ── Reset & base ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-gradient-start: #0a0f1e;
            --bg-gradient-end: #0d1b3e;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.10);
            --header-from: #1a3a6b;
            --header-to: #0e2244;
            --accent: #4f8ef7;
            --accent-dark: #2563eb;
            --accent-glow: rgba(79, 142, 247, 0.35);
            --user-bubble: linear-gradient(135deg, #2563eb, #4f8ef7);
            --bot-bubble: rgba(255, 255, 255, 0.08);
            --bot-border: rgba(255, 255, 255, 0.12);
            --text-primary: #f0f4ff;
            --text-secondary: #94a3c8;
            --input-bg: rgba(255, 255, 255, 0.06);
            --status-ok: #22c55e;
            --status-err: #ef4444;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-card: 0 24px 64px rgba(0, 0, 0, 0.6);
            --transition: 0.25s ease;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Animated grid pattern behind everything */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(79, 142, 247, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 142, 247, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Layout wrapper ── */
        .page {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 16px;
        }

        /* ── Chat card ── */
        .chat-card {
            width: 100%;
            max-width: 560px;
            height: min(760px, 96vh);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, var(--header-from), var(--header-to));
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        .header-logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .header-info {
            flex: 1;
            min-width: 0;
        }

        .header-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Status dot */
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--status-err);
            transition: background var(--transition);
            flex-shrink: 0;
        }

        .status-dot.ok {
            background: var(--status-ok);
            box-shadow: 0 0 6px var(--status-ok);
        }

        #status-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.55);
        }

        /* ── Messages area ── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
        }

        /* ── Message rows ── */
        .msg-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-row.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 1;
        }

        .avatar.bot-av {
            background: linear-gradient(135deg, #1a3a6b, #0e2244);
            border: 1px solid var(--card-border);
        }

        .avatar.user-av {
            background: linear-gradient(135deg, #2563eb, #4f8ef7);
        }

        .bubble {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-size: 13.5px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .user .bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .bot .bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--bot-border);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        /* Source tag under bot bubble */
        .source-tag {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            padding-left: 2px;
            opacity: 0.7;
        }

        /* Typing dots */
        .typing-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.6;
            animation: bounce 1.2s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-5px);
            }
        }

        /* ── Input bar ── */
        .input-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            background: rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
        }

        #msg-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 24px;
            padding: 10px 18px;
            color: var(--text-primary);
            font-size: 13.5px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            resize: none;
            min-height: 42px;
            max-height: 120px;
        }

        #msg-input::placeholder {
            color: var(--text-secondary);
        }

        #msg-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform var(--transition), box-shadow var(--transition);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        #send-btn:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 6px 18px var(--accent-glow);
        }

        #send-btn:disabled {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: none;
            cursor: not-allowed;
        }

        #send-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 8px 12px 12px;
            font-size: 10.5px;
            color: rgba(255, 255, 255, 0.25);
            flex-shrink: 0;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .chat-card {
                height: 100vh;
                border-radius: 0;
                max-width: 100%;
            }

            .page {
                padding: 0;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="chat-card">

            <!-- ── Header ── -->
            <div class="header">
                <div class="header-logo">🎓</div>
                <div class="header-info">
                    <div class="header-title">TCET AI Chatbot</div>
                    <div class="header-sub">
                        <span class="status-dot" id="status-dot"></span>
                        <span id="status-text">Connecting…</span>
                    </div>
                </div>
            </div>

            <!-- ── Messages ── -->
            <div class="messages" id="messages">
                <div class="msg-row bot">
                    <div class="avatar bot-av">🤖</div>
                    <div>
                        <div class="bubble">
                            Hello! I'm the TCET AI Assistant. Ask me anything about Thakur College of Engineering and
                            Technology — admissions, placements, courses, notices, and more.
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Input bar ── -->
            <div class="input-bar">
                <textarea id="msg-input" placeholder="Ask something about TCET…" rows="1"
                    aria-label="Message input"></textarea>
                <button id="send-btn" onclick="sendMessage()" aria-label="Send message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>

            <div class="footer">Powered by Ollama · TCET, Mumbai</div>
        </div>
    </div>

    <script>
        // ── Config ──────────────────────────────────────────────────────
        // Change this to your Dell server's IP if needed:
   const BACKEND = "";

        // ── Status / health check ────────────────────────────────────────
        const dot = document.getElementById("status-dot");
        const stxt = document.getElementById("status-text");

        async function checkHealth() {
            try {
                const res = await fetch(`${BACKEND}/health`, { signal: AbortSignal.timeout(4000) });
                if (res.ok) {
                    dot.classList.add("ok");
                    stxt.textContent = "Connected";
                } else {
                    throw new Error();
                }
            } catch {
                dot.classList.remove("ok");
                stxt.textContent = "Server offline";
            }
        }

        checkHealth();
        setInterval(checkHealth, 30_000);   // re-check every 30 s

        // ── Auto-grow textarea ───────────────────────────────────────────
        const inp = document.getElementById("msg-input");
        inp.addEventListener("input", () => {
            inp.style.height = "auto";
            inp.style.height = Math.min(inp.scrollHeight, 120) + "px";
        });

        inp.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ── Helpers ──────────────────────────────────────────────────────
        const messagesEl = document.getElementById("messages");
        const sendBtn = document.getElementById("send-btn");

        function scrollBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function appendUserBubble(text) {
            const row = document.createElement("div");
            row.className = "msg-row user";
            row.innerHTML = `
      <div class="avatar user-av">👤</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
            messagesEl.appendChild(row);
            scrollBottom();
        }

        function createBotRow() {
            const row = document.createElement("div");
            row.className = "msg-row bot";

            const bubbleWrapper = document.createElement("div");

            const bubble = document.createElement("div");
            bubble.className = "bubble";

            // Typing indicator (shown until first token arrives)
            const typingEl = document.createElement("div");
            typingEl.className = "typing-dots";
            typingEl.innerHTML = "<span></span><span></span><span></span>";
            bubble.appendChild(typingEl);

            bubbleWrapper.appendChild(bubble);
            row.innerHTML = `<div class="avatar bot-av">🤖</div>`;
            row.appendChild(bubbleWrapper);
            messagesEl.appendChild(row);
            scrollBottom();

            return { row, bubble, bubbleWrapper, typingEl };
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        // ── Main send ────────────────────────────────────────────────────
        async function sendMessage() {
            const text = inp.value.trim();
            if (!text) return;

            inp.value = "";
            inp.style.height = "auto";
            sendBtn.disabled = true;

            appendUserBubble(text);

            const { bubble, bubbleWrapper, typingEl } = createBotRow();

            try {
                const res = await fetch(`${BACKEND}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });

                if (!res.ok) {
                    throw new Error(`Server returned ${res.status}`);
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let result = "";
                let firstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    result += chunk;

                    if (firstChunk) {
                        typingEl.remove();   // hide typing dots on first real token
                        firstChunk = false;
                    }

                    bubble.textContent = result;
                    scrollBottom();
                }

                // Show a dim source hint if response looks like it came from docs
                if (result && !result.includes("I don't have") && !result.includes("Hello!")) {
                    const hint = document.createElement("div");
                    hint.className = "source-tag";
                    hint.textContent = "↳ from ingested documents";
                    bubbleWrapper.appendChild(hint);
                }

            } catch (err) {
                typingEl.remove();
                bubble.textContent = `⚠️ Could not reach the server. Make sure it's running at ${BACKEND}.`;
                bubble.style.color = "#fca5a5";
            }

            sendBtn.disabled = false;
            inp.focus();
            scrollBottom();
        }
    </script>
</body>

</html>
